# =============================================================================
# Ambiente de TESTE — GLPIADmit
#
# Simula o ambiente completo com:
#   - MariaDB  (banco de dados do GLPI)
#   - GLPI     (ITSM — acesse http://localhost:8080)
#   - Samba DC (simula Active Directory com suporte completo a atributos AD)
#   - glpiadmit (a própria aplicação)
#
# Uso:
#   bash tests/docker/setup-test-env.sh
#
# Ou manualmente:
#   cp .env.test .env.test  # já existe — edite GLPI_API_TOKEN e GLPI_APP_TOKEN
#   docker compose -f docker-compose.test.yml up -d
# =============================================================================
name: glpiadmit-test

services:

  # ---------------------------------------------------------------------------
  # MariaDB — banco de dados do GLPI
  # ---------------------------------------------------------------------------
  mariadb:
    image: mariadb:10.11
    container_name: test-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: glpidb
      MYSQL_USER: glpi
      MYSQL_PASSWORD: glpipass
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ---------------------------------------------------------------------------
  # GLPI — sistema de chamados
  # Acesse: http://localhost:8080
  # Credenciais padrão: glpi / glpi
  # ---------------------------------------------------------------------------
  glpi:
    image: diouxx/glpi:latest
    container_name: test-glpi
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      TIMEZONE: America/Sao_Paulo
      DB_HOST: mariadb
      DB_NAME: glpidb
      DB_USER: glpi
      DB_PASSWORD: glpipass
    ports:
      - "8080:80"
    volumes:
      - glpi_data:/var/www/html/glpi/files
      - glpi_plugins:/var/www/html/glpi/plugins

  # ---------------------------------------------------------------------------
  # Samba AD DC — simula um Active Directory completo
  #
  # Suporta todos os atributos AD usados pelo GLPIADmit:
  #   unicodePwd, userAccountControl, pwdLastSet, sAMAccountName,
  #   userPrincipalName, Microsoft LDAP extensions (add_members_to_groups)
  #
  # Domain:   TESTE.LOCAL
  # Admin:    Administrator / Admin@Teste123
  # LDAP:     ldap://localhost:389
  # LDAPS:    ldaps://localhost:636  (certificado auto-assinado)
  # ---------------------------------------------------------------------------
  samba-dc:
    image: nowsci/samba-domain
    container_name: test-samba-dc
    hostname: dc01
    restart: unless-stopped
    environment:
      # A imagem deriva: NetBIOS=TESTE, Realm=TESTE.LOCAL a partir de DOMAIN=TESTE.LOCAL
      DOMAIN: TESTE.LOCAL
      DOMAINPASS: Admin@Teste123
      DNSFORWARDER: 8.8.8.8
      INSECURELDAP: "false"
    cap_add:
      - SYS_ADMIN
    volumes:
      - samba_data:/var/lib/samba
      - samba_etc:/etc/samba/external
      # Script de inicialização (OUs, conta de serviço, grupos)
      - ./tests/docker/init-samba.sh:/opt/init-samba.sh:ro
    ports:
      - "389:389"    # LDAP  (para debug/ldapsearch local)
      - "636:636"    # LDAPS (usado pelo glpiadmit)
    networks:
      testnet:
        ipv4_address: 172.29.0.10
    healthcheck:
      # Verifica se as portas LDAP e LDAPS estão respondendo
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/389' 2>/dev/null && bash -c 'echo > /dev/tcp/127.0.0.1/636' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  # ---------------------------------------------------------------------------
  # GLPIADmit — a aplicação (construída a partir do Dockerfile local)
  # Acesse: http://localhost:8443/health
  # Docs:   http://localhost:8443/docs
  # ---------------------------------------------------------------------------
  glpiadmit:
    build:
      context: .
      dockerfile: Dockerfile
    image: glpiadmit:test
    container_name: test-glpiadmit
    restart: unless-stopped
    env_file: .env.test
    # Escuta na porta 80 internamente para que o webhook do GLPI possa chamar sem porta
    # (o GLPI bloqueia URLs com porta explícita como :8443 por SSRF protection).
    # A porta 8443 externa continua funcionando para testes locais.
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "80", "--workers", "2"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    ports:
      - "8443:80"
    depends_on:
      samba-dc:
        condition: service_healthy
      glpi:
        condition: service_started
    extra_hosts:
      # Garante resolução do hostname do DC pelo nome canônico (certificado LDAPS)
      - "dc01.teste.local:172.29.0.10"
      - "dc01:172.29.0.10"
    networks:
      - testnet
      - default

# -------------------------------------------------------------------------
# Redes
# -------------------------------------------------------------------------
networks:
  testnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/24
  default:
    driver: bridge

# -------------------------------------------------------------------------
# Volumes persistentes (removidos com: docker compose -f ... down -v)
# -------------------------------------------------------------------------
volumes:
  mariadb_data:
  glpi_data:
  glpi_plugins:
  samba_data:
  samba_etc:
